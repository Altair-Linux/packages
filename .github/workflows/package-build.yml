name: Package Build

on:
  push:
    paths:
      - '**/astra.pkg'
      - '**/Astrafile.yaml'
      - '**/build.sh'
      - '**/files/**'
      - '.github/workflows/package-build.yml'
  pull_request:
    paths:
      - '**/astra.pkg'
      - '**/Astrafile.yaml'
      - '**/build.sh'
      - '**/files/**'
      - '.github/workflows/package-build.yml'
  workflow_dispatch:

concurrency:
  group: package-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout packages
        uses: actions/checkout@v4

      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          dirs=$(find . -mindepth 2 -maxdepth 2 -name 'astra.pkg' -printf '%h\n' | sed 's|^\./||' | sort)
          if [[ -z "$dirs" ]]; then
            echo 'matrix={"package":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json=$(printf '%s\n' "$dirs" | jq -R . | jq -cs '{package: .}')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  build-packages:
    needs: discover-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.discover-packages.outputs.matrix) }}
    steps:
      - name: Checkout packages
        uses: actions/checkout@v4

      - name: Checkout Astra
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/Astra
          path: Astra

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Astra binary
        working-directory: Astra
        run: cargo build -p astra

      - name: Initialize Astra build environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .astra-ci .astra-root
          Astra/target/debug/astra --data-dir .astra-ci --root .astra-root init
          Astra/target/debug/astra --data-dir .astra-ci --root .astra-root key generate

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/packages
          Astra/target/debug/astra --data-dir .astra-ci --root .astra-root build "${{ matrix.package }}" --output out/packages

      - name: Integration lifecycle test
        shell: bash
        run: |
          set -euo pipefail
          pkg_name=$(basename "${{ matrix.package }}")
          pkg_file=$(find out/packages -maxdepth 1 -type f -name "${pkg_name}-*.astpkg" | head -n1)
          if [[ -z "${pkg_file}" ]]; then
            echo "No package artifact found for ${pkg_name}"
            exit 1
          fi

          mkdir -p .astra-integration-data .astra-integration-root
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root init
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root key generate

          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root install --local "${pkg_file}"
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root remove "${pkg_name}"
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root upgrade

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.package }}-astpkg"
          path: out/packages/*.astpkg
          if-no-files-found: error

  collect-artifacts:
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/packages

      - name: Normalize artifact output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/standard-output
          find dist/packages -type f -name '*.astpkg' -exec cp {} dist/standard-output/ \;
          ls -lah dist/standard-output

      - name: Upload standardized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astra-packages-standard-output
          path: dist/standard-output/*.astpkg
          if-no-files-found: error

  update-altair-repo:
    needs: collect-artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ALTAIR_REPO_TOKEN != ''
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout packages
        uses: actions/checkout@v4

      - name: Checkout altair-repo
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/altair-repo
          token: ${{ secrets.ALTAIR_REPO_TOKEN }}
          path: altair-repo

      - name: Download standardized artifacts
        uses: actions/download-artifact@v4
        with:
          name: astra-packages-standard-output
          path: dist/standard-output

      - name: Publish packages to altair-repo unstable channel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p altair-repo/unstable/packages
          cp -f dist/standard-output/*.astpkg altair-repo/unstable/packages/

      - name: Regenerate unstable repository index
        shell: bash
        working-directory: altair-repo
        run: |
          set -euo pipefail
          pkgs_json="[]"
          shopt -s nullglob
          for file in unstable/packages/*.astpkg; do
            base=$(basename "$file")
            size=$(stat -c%s "$file")
            checksum=$(sha256sum "$file" | awk '{print $1}')

            stem="${base%.astpkg}"
            arch="${stem##*-}"
            rest="${stem%-*}"
            version="${rest##*-}"
            name="${rest%-*}"

            entry=$(jq -n \
              --arg name "$name" \
              --arg version "$version" \
              --arg arch "$arch" \
              --arg checksum "$checksum" \
              --arg filename "$base" \
              --argjson size "$size" \
              '{name:$name,version:$version,architecture:$arch,description:"",dependencies:[],conflicts:[],provides:[],checksum:$checksum,filename:$filename,size:$size,license:"",maintainer:""}')

            pkgs_json=$(jq -c --argjson entry "$entry" '. + [$entry]' <<< "$pkgs_json")
          done

          jq -n \
            --arg name "unstable" \
            --arg description "Altair Linux package repository" \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson packages "$pkgs_json" \
            '{name:$name,description:$description,last_updated:$updated,packages:$packages}' \
            > unstable/index.json

          jq -e . unstable/index.json > /dev/null

      - name: Create pull request in altair-repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ALTAIR_REPO_TOKEN }}
          path: altair-repo
          commit-message: "chore(repo): publish built packages and refresh unstable index"
          title: "chore(repo): publish packages from packages workflow"
          body: |
            Automated update from packages workflow.

            - Publishes latest built `.astpkg` files to `unstable/packages/`
            - Regenerates `unstable/index.json`
          branch: "automation/publish-packages-${{ github.run_id }}"
          base: main
          delete-branch: true

  notify-failure:
    needs: [build-packages, collect-artifacts, update-altair-repo]
    runs-on: ubuntu-latest
    if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
    steps:
      - name: Notify Discord on workflow failure
        shell: bash
        run: |
          set -euo pipefail
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{content:("❌ Package Build workflow failed for " + $repo + "\n" + $run_url)}')
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "${{ secrets.DISCORD_WEBHOOK_URL }}"
