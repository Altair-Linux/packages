name: Package Build

on:
  push:
    branches:
      - '**'
    paths:
      - '**/astra.pkg'
      - '**/Astrafile.yaml'
      - '**/build.sh'
      - '**/files/**'
      - '.github/workflows/package-build.yml'
  pull_request:
    paths:
      - '**/astra.pkg'
      - '**/Astrafile.yaml'
      - '**/build.sh'
      - '**/files/**'
      - '.github/workflows/package-build.yml'
  workflow_dispatch:

concurrency:
  group: package-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-packages:
    name: Discover Packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout packages
        uses: actions/checkout@v4

      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          dirs=$(find . -mindepth 2 -maxdepth 2 -name 'astra.pkg' -printf '%h\n' | sed 's|^\./||' | sort)
          if [[ -z "$dirs" ]]; then
            echo 'matrix={"package":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "$dirs" | jq -R . | jq -cs '{package: .}')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  build-packages:
    name: Build ${{ matrix.package }}
    needs: discover-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.discover-packages.outputs.matrix) }}
    steps:
      - name: Checkout packages
        uses: actions/checkout@v4

      - name: Checkout Astra
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/Astra
          path: Astra

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Astra

      - name: Install OpenSSL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build Astra binary
        working-directory: Astra
        run: cargo build -p astra

      - name: Initialize Astra build environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .astra-ci .astra-root
          Astra/target/debug/astra --data-dir .astra-ci --root .astra-root init
          Astra/target/debug/astra --data-dir .astra-ci --root .astra-root key generate

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/packages
          Astra/target/debug/astra --data-dir .astra-ci --root .astra-root build "${{ matrix.package }}" --output out/packages

      - name: Integration lifecycle test
        shell: bash
        run: |
          set -euo pipefail
          pkg_name=$(basename "${{ matrix.package }}")
          pkg_file=$(find out/packages -maxdepth 1 -type f -name "${pkg_name}-*.astpkg" | head -n1)
          if [[ -z "${pkg_file}" ]]; then
            echo "No package artifact found for ${pkg_name}"
            exit 1
          fi
          mkdir -p .astra-integration-data .astra-integration-root
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root init
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root key generate
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root install --local "${pkg_file}"
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root remove "${pkg_name}"
          Astra/target/debug/astra --data-dir .astra-integration-data --root .astra-integration-root upgrade

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.package }}-astpkg"
          path: out/packages/*.astpkg
          if-no-files-found: error

  collect-artifacts:
    name: Collect Artifacts
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/packages

      - name: Collect into single directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/output
          find dist/packages -type f -name '*.astpkg' -exec cp {} dist/output/ \;
          echo "### Built packages" >> $GITHUB_STEP_SUMMARY
          ls dist/output | while read f; do
            size=$(du -sh "dist/output/$f" | cut -f1)
            sha=$(sha256sum "dist/output/$f" | awk '{print $1}')
            echo "- \`$f\` ($size) \`$sha\`" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-packages
          path: dist/output/*.astpkg
          if-no-files-found: error

  publish:
    name: Publish to altair-repo
    needs: collect-artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check ALTAIR_REPO_TOKEN
        env:
          TOKEN: ${{ secrets.ALTAIR_REPO_TOKEN }}
        run: |
          if [[ -z "${TOKEN}" ]]; then
            echo "ALTAIR_REPO_TOKEN is not set — skipping publish." >&2
            exit 0
          fi

      - name: Checkout altair-repo
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/altair-repo
          token: ${{ secrets.ALTAIR_REPO_TOKEN }}
          path: altair-repo

      - name: Download combined artifacts
        uses: actions/download-artifact@v4
        with:
          name: astra-packages
          path: dist/output

      - name: Publish packages to unstable channel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p altair-repo/unstable/packages
          cp -f dist/output/*.astpkg altair-repo/unstable/packages/

      - name: Regenerate unstable index
        shell: bash
        working-directory: altair-repo
        run: |
          set -euo pipefail
          pkgs_json="[]"
          shopt -s nullglob
          for file in unstable/packages/*.astpkg; do
            base=$(basename "$file")
            size=$(stat -c%s "$file")
            checksum=$(sha256sum "$file" | awk '{print $1}')
            stem="${base%.astpkg}"
            arch="${stem##*-}"
            rest="${stem%-*}"
            version="${rest##*-}"
            name="${rest%-*}"
            entry=$(jq -n \
              --arg name "$name" \
              --arg version "$version" \
              --arg arch "$arch" \
              --arg checksum "$checksum" \
              --arg filename "$base" \
              --argjson size "$size" \
              '{name:$name,version:$version,architecture:$arch,checksum:$checksum,filename:$filename,size:$size}')
            pkgs_json=$(jq -c --argjson entry "$entry" '. + [$entry]' <<< "$pkgs_json")
          done
          jq -n \
            --arg name "unstable" \
            --arg description "Altair Linux package repository" \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson packages "$pkgs_json" \
            '{name:$name,description:$description,last_updated:$updated,packages:$packages}' \
            > unstable/index.json

      - name: Create pull request in altair-repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ALTAIR_REPO_TOKEN }}
          path: altair-repo
          commit-message: "chore(repo): publish packages and refresh unstable index"
          title: "chore(repo): publish packages from packages workflow"
          body: |
            Automated update from packages workflow run ${{ github.run_id }}.
            - Publishes latest built `.astpkg` files to `unstable/packages/`
            - Regenerates `unstable/index.json`
          branch: "automation/publish-packages-${{ github.run_id }}"
          base: main
          delete-branch: true
